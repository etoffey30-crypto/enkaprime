<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnkaPrime - Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages can't find a file, it serves THIS 404.html.
      // We read the path, strip the base, and redirect to the hash-based route
      // so React's hash router picks it up correctly.
      var base = '/enkaprime/';
      var path = window.location.pathname;

      if (path.startsWith(base)) {
        var route = path.substring(base.length);
        if (route && !route.includes('.')) {
          // e.g. /enkaprime/admin -> /enkaprime/#admin
          window.location.replace(base + '#' + route);
        } else {
          // No route — just go home
          window.location.replace(base);
        }
      } else {
        window.location.replace(base);
      }
    </script>
  </head>
  <body>
    <p style="font-family:sans-serif;text-align:center;margin-top:20vh;color:#555">
      Redirecting…
    </p>
  </body>
</html>
