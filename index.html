<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/CLEAN_LOGO_USE_THIS.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page Development</title>
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Convert path-based routes (e.g. /admin) to hash routes (/#admin)
      // This allows the SPA to work when served from the root domain.
      var path = window.location.pathname;

      // If it's not the root and it doesn't look like an asset or file, redirect to hash route
      if (path !== '/' && !path.includes('/assets/') && !path.includes('.')) {
        var route = path.slice(1); // remove leading slash
        window.location.replace('/#' + route);
      }
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
