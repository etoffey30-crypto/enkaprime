<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page Development</title>
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Convert path-based routes (e.g. /enkaprime/admin) to hash routes (/enkaprime/#admin)
      var path = window.location.pathname;
      var base = '/enkaprime/';
      if (path.startsWith(base)) {
        var route = path.substring(base.length);
        if (route && !route.includes('/assets/') && !route.includes('.')) {
          window.location.replace(base + '#' + route);
        }
      } else if (path !== '/' && !path.includes('/assets/') && !path.includes('.')) {
        var route = path.slice(1); // remove leading slash
        window.location.replace('/#' + route);
      }
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
